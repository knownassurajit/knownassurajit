<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="auto" viewBox="0 0 720 180" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Surajit Das - Assistant Manager and Database Engineer">
    <title>Surajit Das profile header</title>
    <desc>Responsive 720 by 180 profile card. The 4:1 ratio keeps GitHub README scaling predictable at narrow and wide widths.</desc>
    <style>
        .title {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 32px;
            font-weight: 700;
            fill: #579DFF;
        }

        .subtitle {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            font-weight: 500;
            fill: #9FADBC;
        }

        .typing-text {
            font-family: ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 14px;
            font-weight: 600;
            fill: #00C7E4;
        }
    </style>

    <!-- The shared card frame uses a 24px content inset and 14px radius to match the stat card. -->
    <rect x="0.5" y="0.5" width="719" height="179" rx="14" fill="#22272B" stroke="#2C333A" stroke-width="1"/>
    <rect x="0.5" y="0.5" width="4" height="179" rx="2" fill="#0C66E4"/>

    <!-- Content starts at 24px plus the accent gutter, so scaled-down renders do not crowd the edge. -->
    <text x="32" y="58" class="title">Surajit Das</text>
    <text x="32" y="90" class="subtitle">Assistant Manager · Business Intelligence · Bosch India</text>

    <!-- The typing baseline sits one 16px section gap below the role copy. -->
    <path id="path0" d="m32,122 h0" fill="none">
        <animate id="d0" attributeName="d" begin="0s;d2.end" dur="4500ms" fill="remove"
                 values="m32,122 h0 ; m32,122 h640 ; m32,122 h640 ; m32,122 h0"
                 keyTimes="0;0.6;0.9;1" />
    </path>
    <text class="typing-text">
        <textPath xlink:href="#path0">Database Engineer | ETL | SQL Optimization</textPath>
    </text>

    <path id="path1" d="m32,122 h0" fill="none">
        <animate id="d1" attributeName="d" begin="d0.end" dur="4500ms" fill="remove"
                 values="m32,122 h0 ; m32,122 h640 ; m32,122 h640 ; m32,122 h0"
                 keyTimes="0;0.6;0.9;1" />
    </path>
    <text class="typing-text">
        <textPath xlink:href="#path1">Manufacturing KPI dashboards &amp; core-banking data</textPath>
    </text>

    <path id="path2" d="m32,122 h0" fill="none">
        <animate id="d2" attributeName="d" begin="d1.end" dur="4500ms" fill="remove"
                 values="m32,122 h0 ; m32,122 h640 ; m32,122 h640 ; m32,122 h0"
                 keyTimes="0;0.6;0.9;1" />
    </path>
    <text class="typing-text">
        <textPath xlink:href="#path2">Building scalable, beautiful data systems</textPath>
    </text>

    <text x="688" y="156" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" fill="#8C9BAB">@knownassurajit</text>
</svg>
