<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 720 180" preserveAspectRatio="xMidYMid meet" role="img" aria-label="GitHub profile overview">
    <title>GitHub profile overview</title>
    <desc>Responsive 720 by 180 statistics card using the same 24px padding, 16px section gap, 8px footer gap, and 14px radius as the profile header.</desc>
    <style>
        .label {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            fill: #9FADBC;
        }

        .metadata,
        .footer {
            font-family: ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            fill: #8C9BAB;
        }

        .stat-value {
            font-family: ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 38px;
            font-weight: 700;
            fill: #C7D1DB;
        }

        .stat-label {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            fill: #8C9BAB;
        }
    </style>

    <rect x="0.5" y="0.5" width="719" height="179" rx="14" fill="#22272B" stroke="#2C333A"/>
    <rect x="0.5" y="0.5" width="4" height="179" rx="2" fill="#0C66E4"/>

    <circle cx="32" cy="32" r="4" fill="#579DFF"/>
    <text x="48" y="36" class="label">PROFILE OVERVIEW</text>
    <text x="688" y="36" text-anchor="end" class="metadata" font-size="11">@knownassurajit</text>

    <line x1="32" y1="56" x2="688" y2="56" stroke="#2C333A"/>

    <text x="152" y="111" text-anchor="middle" class="stat-value">18</text>
    <text x="152" y="135" text-anchor="middle" class="stat-label">REPOSITORIES</text>

    <line x1="276" y1="78" x2="276" y2="132" stroke="#2C333A"/>

    <text x="360" y="111" text-anchor="middle" class="stat-value">3</text>
    <text x="360" y="135" text-anchor="middle" class="stat-label">FOLLOWERS</text>

    <line x1="444" y1="78" x2="444" y2="132" stroke="#2C333A"/>

    <text x="568" y="111" text-anchor="middle" class="stat-value">6</text>
    <text x="568" y="135" text-anchor="middle" class="stat-label">FOLLOWING</text>

    <text x="688" y="156" text-anchor="end" class="footer" font-size="10">synced 21 Jun 2026 · GitHub API</text>
</svg>
